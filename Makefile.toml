[config]
skip_core_tasks = true


[tasks.setup]
# Последовательно: поднимаем докер и создаем таблицу -> запускаем ваш reset
dependencies = ["setup-container", "reset"]


[tasks.setup-container]
private = true
script_runner = "@shell"
script = """
docker rm -f postgres-axum 2>/dev/null || true

docker run --name postgres-axum \
  -e POSTGRES_PASSWORD=password \
  -e POSTGRES_DB=myapp \
  -p 5432:5432 \
  -d postgres:alpine

echo "Ожидаем запуск PostgreSQL..."
until docker exec postgres-axum pg_isready -U postgres -d myapp >/dev/null 2>&1; do
  sleep 0.5
done

docker exec -i postgres-axum psql -U postgres -d myapp -c "
  CREATE TABLE IF NOT EXISTS users (
      id SERIAL PRIMARY KEY,
      name TEXT NOT NULL,
      email TEXT NOT NULL UNIQUE,
      gender TEXT NOT NULL
  );
"
"""


[tasks.reset]
script_runner = "@shell"
script = """
# Выполняем весь SQL внутри контейнера через Heredoc
docker exec -i postgres-axum psql -U postgres -d myapp <<'EOF'

-- 1. Создаем функцию транслитерации
CREATE OR REPLACE FUNCTION transliterate_iso(txt text) RETURNS text AS $$
DECLARE
  result text;
BEGIN
  result := lower(txt);
  
  -- ISO 9 (Система Б) для составных букв
  result := replace(result, 'щ', 'shch');
  result := replace(result, 'ч', 'ch');
  result := replace(result, 'ш', 'sh');
  result := replace(result, 'ж', 'zh');
  result := replace(result, 'х', 'kh');
  result := replace(result, 'ц', 'cz');
  result := replace(result, 'ю', 'yu');
  result := replace(result, 'я', 'ya');
  result := replace(result, 'ё', 'yo');
  
  -- ВАРИАНТ 1: Безопасное удаление знаков для email
  result := replace(result, 'ь', '');
  result := replace(result, 'ъ', '');
  
  -- Остальные буквы один к одному по ISO 9
  result := translate(result, 
      'абвгдезийклмнопрстуфэы', 
      'abvgdeziijklmnoprstufei'
  );
  
  RETURN result;
END;
$$ LANGUAGE plpgsql IMMUTABLE;

-- 2. Очищаем таблицу
TRUNCATE TABLE users RESTART IDENTITY CASCADE;

-- 3. Вставляем новые уникальные данные с транслитом в email и сохранением пола
INSERT INTO users (name, email, gender)
SELECT 
    name_str,
    -- Важно: функция называется transliterate_iso, а не transliterate
    transliterate_iso(replace(name_str, ' ', '.')) || i || floor(random() * 90 + 10)::text || '@' || random_domains[floor(random() * array_length(random_domains, 1) + 1)],
    gender_str
FROM (
    SELECT 
        i,
        CASE 
            WHEN is_male THEN 'male'
            ELSE 'female'
        END AS gender_str,
        CASE 
            WHEN is_male THEN
                initcap(m_names[floor(random() * array_length(m_names, 1) + 1)]) || ' ' || 
                initcap(m_surnames[floor(random() * array_length(m_surnames, 1) + 1)])
            ELSE
                initcap(f_names[floor(random() * array_length(f_names, 1) + 1)]) || ' ' || 
                initcap(f_surnames[floor(random() * array_length(f_surnames, 1) + 1)])
        END AS name_str,
        random_domains
    FROM (
        SELECT (random() > 0.5) AS is_male, i 
        FROM generate_series(1, 100) AS i
    ) AS steps
    CROSS JOIN (
        SELECT 
            ARRAY['александр', 'дмитрий', 'сергей', 'андрей', 'алексей', 'максим', 'евгений', 'иван', 'михаил', 'артем'] AS m_names,
            ARRAY['елена', 'ольга', 'наталья', 'екатерина', 'анна', 'мария', 'юлия', 'анастасия', 'татьяна', 'светлана'] AS f_names,
            ARRAY['иванов', 'петров', 'сидоров', 'смирнов', 'кузнецов', 'попов', 'васильев', 'соколов', 'михайлов', 'новиков', 'федоров', 'морозов', 'волков', 'соловьев'] AS m_surnames,
            ARRAY['иванова', 'петрова', 'сидорова', 'смирнова', 'кузнецова', 'попова', 'васильева', 'соколова', 'михайлова', 'новикова', 'федорова', 'морозова', 'волкова', 'соловьева'] AS f_surnames,
            ARRAY['gmail.com', 'yandex.ru', 'mail.ru', 'outlook.com'] AS random_domains
    ) AS arrays
) AS mock_data
ON CONFLICT (email) DO NOTHING;

EOF

# После сброса запускаем приложение
cargo run
"""


[tasks.up]
script_runner = "@shell"
script = """
# Проверяем, существует ли контейнер (в любом состоянии)
if [ "$(docker ps -aq -f name=^postgres-axum$)" ]; then
  echo "Контейнер найден. Запускаем без потери данных..."
  docker start postgres-axum

  echo "Ожидаем готовность PostgreSQL..."
  until docker exec postgres-axum pg_isready -U postgres -d myapp >/dev/null 2>&1; do
    sleep 0.5
  done

  # Просто запускаем приложение, так как БД уже настроена
  cargo run
else
  echo "Контейнер не найден! Перенаправляем на полную инициализацию..."
  # Вызываем таск setup через cargo-make
  cargo make setup
fi
"""


[tasks.down]
script_runner = "@shell"
script = """
echo "Останавливаем и удаляем контейнер postgres-axum..."
docker stop postgres-axum 2>/dev/null || true
docker rm postgres-axum 2>/dev/null || true
echo "Контейнер успешно удален!"
"""
